<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Image Generator — Fantgame</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1a1a; --bg2: #242424; --bg3: #2e2e2e;
  --border: #3a3a3a; --border2: #4a4a4a;
  --ink: #e8e4dc; --muted: #888; --accent: #c8a96e;
  --radius: 6px; --radiuslg: 10px;
}
body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 900px; margin: 0 auto; }
h1 { font-size: 1.4rem; font-weight: 500; color: var(--accent); margin-bottom: 0.25rem; }
.subtitle { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
.key-row { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
.key-row input[type="password"] { flex: 1; min-width: 180px; font-size: 13px; padding: 0 12px; height: 38px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--ink); }
.key-row input[type="password"]:focus { outline: none; border-color: var(--accent); }
.tabs { display: flex; border-bottom: 1px solid var(--border2); margin-bottom: 1.5rem; }
.tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 24px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; margin-bottom: -1px; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.panel { display: none; } .panel.active { display: block; }
.section-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
.fields-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 12px; color: var(--muted); }
.field input, .field select { height: 36px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--ink); font-size: 13px; padding: 0 10px; }
.field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
.field select option { background: var(--bg2); }
.prompt-area { width: 100%; min-height: 80px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--ink); font-size: 13px; padding: 10px 12px; resize: vertical; font-family: inherit; line-height: 1.5; margin-bottom: 1.25rem; }
.prompt-area:focus { outline: none; border-color: var(--accent); }
.prompt-preview { font-size: 12px; color: var(--muted); background: var(--bg3); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 1.25rem; line-height: 1.6; border: 1px solid var(--border); }
.prompt-preview strong { color: var(--ink); font-weight: 500; }
.mode-toggle { display: flex; gap: 6px; margin-bottom: 1rem; }
.mode-btn { font-size: 12px; padding: 5px 14px; border: 1px solid var(--border2); border-radius: var(--radius); background: none; color: var(--muted); cursor: pointer; }
.mode-btn.active { background: var(--bg3); color: var(--ink); border-color: var(--accent); }
.gen-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 2rem; }
.gen-btn { height: 38px; padding: 0 24px; background: var(--accent); color: #1a1a1a; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; }
.gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.count-select { height: 38px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--ink); font-size: 13px; padding: 0 10px; }
.results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.results-header span { font-size: 13px; color: var(--muted); }
.save-all-btn { height: 34px; padding: 0 16px; font-size: 12px; border: 1px solid var(--border2); border-radius: var(--radius); background: none; color: var(--ink); cursor: pointer; }
.save-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }
.image-card { border: 1px solid var(--border); border-radius: var(--radiuslg); overflow: hidden; background: var(--bg2); }
.image-card img { width: 100%; display: block; aspect-ratio: 3/4; object-fit: cover; }
.image-card-bg img { aspect-ratio: 4/3; }
.image-card-info { padding: 10px 12px; }
.image-name { font-size: 11px; font-weight: 500; color: var(--accent); margin-bottom: 6px; word-break: break-all; }
.image-actions { display: flex; gap: 5px; flex-wrap: wrap; }
.img-btn { flex: 1; min-width: 60px; height: 28px; font-size: 11px; border: 1px solid var(--border2); border-radius: var(--radius); background: none; color: var(--ink); cursor: pointer; white-space: nowrap; }
.img-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.status-msg { font-size: 11px; padding: 4px 8px; border-radius: var(--radius); margin-top: 6px; }
.status-ok { background: #1a3a2a; color: #4caf82; }
.status-err { background: #3a1a1a; color: #e07070; }
.loading-card { border: 1px solid var(--border); border-radius: var(--radiuslg); background: var(--bg3); display: flex; align-items: center; justify-content: center; aspect-ratio: 3/4; }
.loading-card-bg { aspect-ratio: 4/3; }
hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
#global-status { margin-top: 1rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Image Generator</h1>
  <p class="subtitle">NPC portraits &amp; background scenes</p>
  <div class="key-row">
    <input type="password" id="dezgo-key" placeholder="Dezgo API key" autocomplete="off" />
    <input type="password" id="github-token" placeholder="GitHub token" autocomplete="off" />
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;">
      <input type="checkbox" id="remember-token" style="accent-color:var(--accent);width:14px;height:14px;" /> Remember token
    </label>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('npc')">&#128100; NPC</button>
    <button class="tab-btn" onclick="switchTab('bg')">&#127760; Background</button>
  </div>
  <div id="panel-npc" class="panel active">
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('npc','fields')">Structured fields</button>
      <button class="mode-btn" onclick="setMode('npc','free')">Free text</button>
    </div>
    <div id="npc-fields">
      <div class="section-label">Character details</div>
      <div class="fields-grid">
        <div class="field"><label>Race</label><input id="npc-race" placeholder="e.g. human, elf, dwarf" /></div>
        <div class="field"><label>Gender</label>
          <select id="npc-gender"><option value="">— any —</option><option>male</option><option>female</option><option>old man</option><option>old woman</option></select>
        </div>
        <div class="field"><label>Role / class</label><input id="npc-role" placeholder="e.g. beggar, guard, mage" /></div>
        <div class="field"><label>Appearance</label><input id="npc-appearance" placeholder="e.g. scarred, ragged, noble" /></div>
        <div class="field"><label>Expression</label><input id="npc-expression" placeholder="e.g. frowning, stern, cheerful" /></div>
        <div class="field"><label>Pose</label><input id="npc-pose" placeholder="e.g. sitting, standing" /></div>
      </div>
      <div class="section-label">Prompt preview</div>
      <div class="prompt-preview" id="npc-preview">Fill in fields above to see the generated prompt.</div>
    </div>
    <div id="npc-free" style="display:none">
      <div class="section-label">Character description</div>
      <textarea class="prompt-area" id="npc-free-text" placeholder="Describe the character in your own words..."></textarea>
    </div>
    <div class="gen-row">
      <button class="gen-btn" id="npc-gen-btn" onclick="generate('npc')">Generate</button>
      <select class="count-select" id="npc-count">
        <option value="1">1 image</option><option value="2">2 images</option><option value="4">4 images</option>
      </select>
    </div>
  </div>
  <div id="panel-bg" class="panel">
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('bg','fields')">Structured fields</button>
      <button class="mode-btn" onclick="setMode('bg','free')">Free text</button>
    </div>
    <div id="bg-fields">
      <div class="section-label">Scene details</div>
      <div class="fields-grid">
        <div class="field"><label>Location type</label><input id="bg-location" placeholder="e.g. tavern, forest, dungeon" /></div>
        <div class="field"><label>Time of day</label>
          <select id="bg-time"><option value="">— any —</option><option>dawn</option><option>day</option><option>dusk</option><option>night</option></select>
        </div>
        <div class="field"><label>Mood / weather</label><input id="bg-mood" placeholder="e.g. misty, stormy, warm" /></div>
        <div class="field"><label>Key detail</label><input id="bg-detail" placeholder="e.g. firelit, overgrown, ancient" /></div>
        <div class="field"><label>Era / style</label><input id="bg-era" placeholder="e.g. medieval, ruined, coastal" /></div>
      </div>
      <div class="section-label">Prompt preview</div>
      <div class="prompt-preview" id="bg-preview">Fill in fields above to see the generated prompt.</div>
    </div>
    <div id="bg-free" style="display:none">
      <div class="section-label">Scene description</div>
      <textarea class="prompt-area" id="bg-free-text" placeholder="Describe the scene in your own words..."></textarea>
    </div>
    <div class="gen-row">
      <button class="gen-btn" id="bg-gen-btn" onclick="generate('bg')">Generate</button>
      <select class="count-select" id="bg-count">
        <option value="1">1 image</option><option value="2">2 images</option><option value="4">4 images</option>
      </select>
    </div>
  </div>
  <div id="results-section" style="display:none">
    <hr />
    <div class="results-header">
      <span id="results-label">Generated images</span>
      <button class="save-all-btn" id="save-all-btn" onclick="saveAllToGitHub()">&#128190; Save all to GitHub</button>
    </div>
    <div class="image-grid" id="image-grid"></div>
    <div id="global-status"></div>
  </div>
</div>
<script>
const DEZGO_URL = 'https://api.dezgo.com/text2image_sdxl_lightning';
const GITHUB_OWNER = '1984tpearson';
const GITHUB_REPO = 'fantgame';
const NPC_SUFFIX = `Mediaeval+++, Fully body shot++, No background+++ (gritty Comic book Art style+, Thick black ink outlines, flat cell shading, painterly colouring)++`;
const NPC_NEG = `Background-- Close up, Anime--, Photo Realistic, Smooth shading, texture, extra cloth--, loose fabric--, monochrome, sketch, tattoos, big mouth, big smile, sci-fi, superhero, muscles, muscular, extra limbs, badly drawn hands`;
const BG_NEG = ``;

let modes = { npc: 'fields', bg: 'fields' };
let generatedImages = [];

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('gh_token');
  if (saved) { document.getElementById('github-token').value = saved; document.getElementById('remember-token').checked = true; }
  const tokenInput = document.getElementById('github-token');
  const rememberBox = document.getElementById('remember-token');
  rememberBox.addEventListener('change', () => {
    if (rememberBox.checked) localStorage.setItem('gh_token', tokenInput.value);
    else localStorage.removeItem('gh_token');
  });
  tokenInput.addEventListener('input', () => { if (rememberBox.checked) localStorage.setItem('gh_token', tokenInput.value); });
});

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='npc')||(i===1&&tab==='bg')));
  document.getElementById('panel-npc').classList.toggle('active', tab==='npc');
  document.getElementById('panel-bg').classList.toggle('active', tab==='bg');
}
function setMode(tab, mode) {
  modes[tab] = mode;
  const btns = document.querySelectorAll(`#panel-${tab} .mode-btn`);
  btns[0].classList.toggle('active', mode==='fields');
  btns[1].classList.toggle('active', mode==='free');
  document.getElementById(`${tab}-fields`).style.display = mode==='fields' ? '' : 'none';
  document.getElementById(`${tab}-free`).style.display = mode==='free' ? '' : 'none';
}
function buildNpcPrompt() {
  const parts = [v('npc-race'), v('npc-gender'), v('npc-role'), v('npc-appearance') ? `looking ${v('npc-appearance')}` : '', v('npc-expression') ? `${v('npc-expression')} expression` : '', v('npc-pose')].filter(Boolean);
  const desc = parts.join(', ');
  return desc ? `${desc}. ${NPC_SUFFIX}` : NPC_SUFFIX;
}
function buildBgPrompt() {
  return [v('bg-location'), v('bg-time') ? `${v('bg-time')} light` : '', v('bg-mood'), v('bg-detail'), v('bg-era')].filter(Boolean).join(', ');
}
function buildFilename(tab) {
  if (tab === 'npc') return [slug(v('npc-race')||'character'), slug(v('npc-role')||'npc'), slug(v('npc-appearance')||v('npc-expression')||'unknown')].join('_');
  return [slug(v('bg-location')||'location'), slug(v('bg-time')||'unknown'), slug(v('bg-detail')||v('bg-mood')||'scene')].join('_');
}
function buildFreeFilename(tab, text) {
  return text.trim().toLowerCase().replace(/[^a-z0-9 ]/g,'').split(/\s+/).slice(0,4).join('_') || (tab==='npc' ? 'npc_unknown' : 'bg_unknown');
}
function slug(s) { return s.trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); }
function v(id) { return (document.getElementById(id)||{}).value||''; }

['npc-race','npc-gender','npc-role','npc-appearance','npc-expression','npc-pose'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', () => {
    document.getElementById('npc-preview').innerHTML = `<strong>Prompt:</strong> ${buildNpcPrompt()}<br><br><strong>Negative:</strong> ${NPC_NEG}`;
  });
});
['bg-location','bg-time','bg-mood','bg-detail','bg-era'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', () => {
    document.getElementById('bg-preview').textContent = buildBgPrompt() || 'Fill in fields above to see the generated prompt.';
  });
});

async function generate(tab) {
  const dezgoKey = v('dezgo-key');
  if (!dezgoKey) { alert('Enter your Dezgo API key first.'); return; }
  const isNpc = tab === 'npc';
  const mode = modes[tab];
  let prompt, baseName;
  if (mode === 'fields') {
    prompt = isNpc ? buildNpcPrompt() : buildBgPrompt();
    baseName = buildFilename(tab);
  } else {
    const freeText = v(`${tab}-free-text`).trim();
    if (!freeText) { alert('Enter a description first.'); return; }
    prompt = isNpc ? `${freeText}. ${NPC_SUFFIX}` : freeText;
    baseName = buildFreeFilename(tab, freeText);
  }
  const count = parseInt(v(`${tab}-count`)) || 1;
  const btn = document.getElementById(`${tab}-gen-btn`);
  btn.disabled = true; btn.textContent = 'Generating...';
  document.getElementById('results-section').style.display = '';
  document.getElementById('results-label').textContent = `Generating ${count} image${count>1?'s':''}...`;
  const grid = document.getElementById('image-grid');
  const placeholders = [];
  for (let i = 0; i < count; i++) {
    const ph = document.createElement('div');
    ph.className = `loading-card${isNpc?'':' loading-card-bg'}`;
    ph.innerHTML = `<span class="spinner"></span>`;
    grid.appendChild(ph); placeholders.push(ph);
  }
  const subfolder = isNpc ? 'npcs' : 'backgrounds';
  const width = isNpc ? 768 : 1024;
  const height = isNpc ? 1024 : 768;
  const negPrompt = isNpc ? NPC_NEG : BG_NEG;
  const promises = Array.from({length: count}, async (_, i) => {
    try {
      const body = new FormData();
      body.append('prompt', prompt);
      body.append('model', 'envy_starlight_xl_01_lightning_1024px');
      body.append('width', String(width)); body.append('height', String(height));
      body.append('guidance', '2.0'); body.append('sampler', 'ddim');
      body.append('format', 'png'); body.append('transparent_background', 'false');
      if (negPrompt) body.append('negative_prompt', negPrompt);
      const res = await fetch(DEZGO_URL, {
        method: 'POST',
        headers: { 'X-Dezgo-Key': dezgoKey },
        body
      });
      if (!res.ok) { const t = await res.text(); throw new Error(`Dezgo error ${res.status}: ${t}`); }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const suffix = count > 1 ? `_${i+1}` : '';
      const filename = `${baseName}${suffix}.png`;
      const arrayBuffer = await blob.arrayBuffer();
      const bytes = new Uint8Array(arrayBuffer);
      let binary = '';
      const chunkSize = 8192;
      for (let j = 0; j < bytes.length; j += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(j, j + chunkSize));
      }
      const base64 = btoa(binary);
      generatedImages.push({ url, filename, base64, subfolder, saved: false });
      const idx = generatedImages.length - 1;
      const card = document.createElement('div');
      card.className = `image-card${isNpc?'':' image-card-bg'}`;
      card.innerHTML = `<img src="${url}" alt="${filename}" /><div class="image-card-info"><div class="image-name">${filename}</div><div class="image-actions"><button class="img-btn" onclick="downloadImage(${idx})">&#8659; Download</button><button class="img-btn" id="gh-btn-${idx}" onclick="saveToGitHub(${idx})">&#128190; GitHub</button><button class="img-btn" onclick="copyPrompt(${idx})">&#128203; Prompt</button></div><div id="status-${idx}"></div></div>`;
      placeholders[i].replaceWith(card);
    } catch(err) {
      placeholders[i].innerHTML = `<span style="font-size:12px;color:#e07070;padding:1rem;display:block">${err.message}</span>`;
    }
  });
  await Promise.all(promises);
  document.getElementById('results-label').textContent = `${generatedImages.length} image${generatedImages.length!==1?'s':''} generated`;
  btn.disabled = false; btn.textContent = 'Generate';
}

function downloadImage(idx) {
  const img = generatedImages[idx];
  const a = document.createElement('a'); a.href = img.url; a.download = img.filename; a.click();
}
function copyPrompt(idx) {
  navigator.clipboard.writeText(generatedImages[idx].filename).catch(()=>{});
}
async function saveToGitHub(idx) {
  const token = v('github-token');
  if (!token) { alert('Enter your GitHub token first.'); return; }
  const img = generatedImages[idx];
  const btn = document.getElementById(`gh-btn-${idx}`);
  const status = document.getElementById(`status-${idx}`);
  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>`;
  status.textContent = '';
  try {
    const path = `images/${img.subfolder}/${img.filename}`;
    const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Add ${img.filename}`, content: img.base64 })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || `GitHub error ${res.status}`); }
    generatedImages[idx].saved = true;
    status.className = 'status-msg status-ok'; status.textContent = 'Saved to GitHub';
    btn.textContent = '✓ Saved';
  } catch(err) {
    status.className = 'status-msg status-err'; status.textContent = err.message;
    btn.disabled = false; btn.innerHTML = '&#128190; GitHub';
  }
}
async function saveAllToGitHub() {
  const token = v('github-token');
  if (!token) { alert('Enter your GitHub token first.'); return; }
  const unsaved = generatedImages.map((img,i) => ({img,i})).filter(({img}) => !img.saved);
  if (!unsaved.length) { alert('All images already saved to GitHub.'); return; }
  const btn = document.getElementById('save-all-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  let success = 0, fail = 0;
  for (const {i} of unsaved) {
    try { await saveToGitHub(i); success++; } catch { fail++; }
    await new Promise(r => setTimeout(r, 400));
  }
  btn.disabled = false; btn.textContent = '\uD83D\uDCBE Save all to GitHub';
  const gs = document.getElementById('global-status');
  gs.className = `status-msg ${fail ? 'status-err' : 'status-ok'}`;
  gs.textContent = fail ? `${success} saved, ${fail} failed` : `All ${success} saved to GitHub`;
}
</script>
</body>
</html>
